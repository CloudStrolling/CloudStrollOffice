server:
  port: 9000

spring:
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: lb://cloudoffice-auth-service
          predicates:
            - Path=/api/v1/auth/**
        - id: biz-service
          uri: lb://cloudoffice-biz-service
          predicates:
            - Path=/api/v1/biz/**
        - id: system-service
          uri: lb://cloudoffice-system-service
          predicates:
            - Path=/api/v1/system/**
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: true
      discovery:
        locator:
          enabled: true

# RSA 公钥配置
# 优先级：环境变量 > 配置文件 Base64 > PEM 文件路径
auth:
  rsa:
    public-key: ${RSA_PUBLIC_KEY:}
    public-key-path: ${RSA_PUBLIC_KEY_PATH:}

logging:
  level:
    org.springframework.cloud.gateway: INFO
