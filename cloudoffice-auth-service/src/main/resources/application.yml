server:
  port: 9100

spring:
  application:
    name: cloudoffice-auth-service
  datasource:
    url: jdbc:mariadb://${DB_HOST:127.0.0.1}:${DB_PORT:3306}/${DB_AUTH_NAME:cloudstroll_office_auth}?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: org.mariadb.jdbc.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 300000
      max-lifetime: 1200000
      connection-timeout: 30000
  redis:
    host: ${REDIS_HOST:127.0.0.1}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:}
    database: ${REDIS_DATABASE:0}
    timeout: 5000ms
    lettuce:
      pool:
        max-active: 16
        max-idle: 8
        min-idle: 4
        max-wait: -1ms

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html

mybatis-plus:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: org.cloudstrolling.cloudoffice.auth.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: ASSIGN_ID
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

jwt:
  secret: ${JWT_SECRET:cloudstrollDefaultJwtSecretKeyForDevEnvironmentOnly}
  expiration: 86400000
  algorithm: HS256
  access-token-expiration: 7200       # 2小时（秒）
  refresh-token-expiration: 604800    # 7天（秒）
  rsa:
    private-key: ${RSA_PRIVATE_KEY:}
    public-key: ${RSA_PUBLIC_KEY:}

app:
  verification-code:
    mock: true                       # 开发环境模拟模式，直接返回固定验证码
    expire-seconds: 300              # 验证码过期时间（秒），默认 5 分钟
    send-interval-seconds: 60        # 发送间隔（秒），默认 1 分钟
    length: 6                        # 验证码长度

  password:
    min-length: 8                    # 密码最小长度
    max-length: 64                   # 密码最大长度

logging:
  level:
    org.cloudstrolling: DEBUG
